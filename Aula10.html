<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      nav {
        background: black;
        color: white;
        padding: 10px;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 15px;
      }

      nav a {
        text-decoration: none;
        color: white;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="#">home</a></li>
        <li><a href="#">about</a></li>
        <li><a href="#">products</a></li>
      </ul>
    </nav>

    <ul>
      <li>item 2</li>
      <li>item 1</li>
    </ul>

    <ol type="a">
      <li>item 1</li>
      <li>item 2</li>
    </ol>

    <dl>
      <dt>Cafe</dt>
      <dd>bebida preta</dd>
    </dl>
  </body>
</html>
